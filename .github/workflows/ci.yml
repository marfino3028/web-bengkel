name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Nuxt
        run: npm run build
        env:
          NUXT_PUBLIC_API_BASE: https://example.com/api
